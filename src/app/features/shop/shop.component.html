<div class="backdrop">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="shop-name">
    <header>
      <div>
        <div class="kicker">Today's Circular</div>
        <div id="shop-name" class="shop-name" [style.color]="shop().accent">{{ shop().name }}</div>
      </div>

      <div class="right">
        <button class="close" type="button" aria-label="Close" (click)="game.leaveShop()">✕</button>
        <div class="purse">{{ game.cur().leaves }} <small>leaves</small></div>
      </div>
    </header>

    <div class="grid">
      @for (it of items(); track it.key) {
        <div class="clip">
          <div class="art">
            @if (it.owned > 0) {
              <span class="owned" aria-label="Already owned: {{ it.owned }}">× {{ it.owned }}</span>
            }
            <div class="art-scale">
              <app-item-icon [key]="it.key" />
            </div>
          </div>
          <div class="name">{{ it.name }}</div>
          <div class="tag">{{ it.tag }}</div>
          <div class="price">
            <span class="leaf-icon" aria-hidden="true">
              <app-item-icon key="leaf" [viewBox]="'0 0 30 30'" />
            </span>
            @if (it.disc) {
              <s>{{ it.price }}</s>
            }
            <b>{{ it.disp }}</b>
          </div>
          <button type="button" [disabled]="!it.afford || !game.shopArmed()" (click)="game.buy(it.key)">
            {{ it.afford ? 'Buy it' : 'too dear' }}
          </button>
        </div>
      }
    </div>

    <footer>
      <span>Buy one thing per visit — then it's the next player's turn.</span>
      <button type="button" (click)="game.leaveShop()">Leave empty-handed →</button>
    </footer>
  </div>
</div>
