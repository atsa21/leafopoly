<div class="lobby">
  <div class="status" [class.live]="mp.peerJoined() || mp.status() === 'connected'">
    {{ statusText() }}
  </div>
  <div class="me">
    You are <strong [style.color]="game.cur().color">{{ myName() }}</strong>
    @if (!game.isMyTurn()) {
      <span> · waiting for {{ game.cur().name }}…</span>
    }
  </div>

  @if (mp.mySlot() === 0 && link()) {
    <label class="share">
      <span>Invite link</span>
      <input type="text" [value]="link()" readonly (focus)="$any($event.target).select()" />
    </label>
    <button class="copy" type="button" (click)="copy()">
      {{ copied() ? 'Copied ✓' : 'Copy link' }}
    </button>
  }
</div>
