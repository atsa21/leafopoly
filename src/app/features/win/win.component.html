<div class="backdrop">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="win-title">
    <div class="laurel" aria-hidden="true">🏆</div>
    <p class="kicker">A cozy home, complete</p>
    <h2 id="win-title">
      <span class="name" [style.color]="winnerColor()">{{ winnerName() }}</span> wins!
    </h2>
    <p class="lede">
      Collected at least {{ game.categoryGoal }} of every kind — the little room is full.
    </p>

    <ul class="tally">
      @for (r of rows(); track r.label) {
        <li>
          <span class="tlabel">{{ r.label }}</span>
          <span class="tcount">{{ r.count }} / {{ r.goal }}</span>
          <span class="tcheck" aria-hidden="true">✓</span>
        </li>
      }
    </ul>

    <button class="primary" type="button" (click)="playAgain()">Play again ▸</button>
  </div>
</div>
