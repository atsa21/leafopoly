<div class="backdrop">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="coupon-title">
    <header>
      <div class="kicker">The Bargain Desk</div>
      <h2 id="coupon-title">Snip a Coupon</h2>
    </header>
    <p class="howto">
      Drag the scissors like a zipper — all the way around the dotted line. ({{ game.cutStep() }}/4)
    </p>

    <button
      class="wrap"
      type="button"
      [class.cutting]="dragging()"
      [disabled]="game.couponDone()"
      [attr.aria-label]="'Drag the scissors along the dotted line to cut, ' + game.cutStep() + ' of 4 cuts made'"
      (pointerdown)="onDown($event)"
      (pointermove)="onMove($event)"
      (pointerup)="onUp()"
      (pointercancel)="onUp()"
      (touchmove)="onTouchMove($event)"
      (click)="onClick($event)"
    >
      <span class="clip">
        <span class="ticket" [class.done]="game.couponDone()">
          <span class="masthead">Manufacturer Coupon · The Leaf Market</span>
          <span class="save">Save</span>
          <span class="pct">{{ game.couponVal() }}<span class="sym">%</span></span>
          <span class="off">off your next thing you carry home</span>
          <span class="barcode" aria-hidden="true"></span>
        </span>
      </span>
      <i class="edge top"></i>
      <i class="edge right"></i>
      <i class="edge bottom"></i>
      <i class="edge left"></i>
      <i class="cut top" [style.transform]="'scaleX(' + fills().top + ')'"></i>
      <i class="cut right" [style.transform]="'scaleY(' + fills().right + ')'"></i>
      <i class="cut bottom" [style.transform]="'scaleX(' + fills().bottom + ')'"></i>
      <i class="cut left" [style.transform]="'scaleY(' + fills().left + ')'"></i>
      <span class="scissors" [class.live]="dragging()" [style.left.px]="scissors()[0]" [style.top.px]="scissors()[1]">✂</span>
    </button>

    <div class="foot">
      @if (game.couponDone()) {
        <button class="take" type="button" (click)="game.collectCoupon()">
          Tuck it in my pocket →
        </button>
      } @else {
        <p>Keep dragging… trace the scissors around the corner.</p>
      }
    </div>
  </div>
</div>
