<div class="backdrop" (click)="close()">
  <div
    class="sheet"
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-title"
    (click)="$event.stopPropagation()"
  >
    <header>
      <div>
        <div class="kicker">Edition Settings — set your terms</div>
        <h2 id="settings-title">House Rules</h2>
      </div>
      <button class="close" type="button" aria-label="Close settings" (click)="close()">✕</button>
    </header>

    <app-settings-form [field]="f" />

    <footer>
      <button class="ghost" type="button" (click)="close()">Cancel</button>
      <div class="actions">
        <button type="button" [disabled]="!f().valid()" (click)="save()">Save</button>
        @if (showNewGame()) {
          <button class="primary" type="button" [disabled]="!f().valid()" (click)="saveAndRestart()">
            Save &amp; new game
          </button>
        }
      </div>
    </footer>
  </div>
</div>
